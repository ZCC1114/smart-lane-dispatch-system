spring.datasource.url=jdbc:h2:mem:smart-lane-dispatch-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.data.redis.repositories.enabled=false
app.redis.enabled=false
app.jwt.secret=smart-lane-dispatch-demo-secret
app.jwt.expire-hours=8
app.cors.allowed-origins=http://localhost:3000,http://localhost:3002
app.bootstrap-admin.enabled=false
