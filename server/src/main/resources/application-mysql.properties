spring.datasource.url=${APP_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/smart_lane_dispatch?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${APP_DATASOURCE_USERNAME:root}
