# ============================================================
# 基础服务配置
# ============================================================
# 应用名称，仅用于日志、Actuator info 等标识。
spring.application.name=smart-lane-dispatch-system

# 后端 HTTP 服务端口。本地前端默认访问 http://localhost:8080。
server.port=8080


# ============================================================
# 数据库配置
# ============================================================
# 本地和现场默认使用 MySQL，避免 H2 内存库重启后丢账号、丢业务数据。
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/smart_lane_dispatch?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${APP_DATASOURCE_USERNAME:root}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:root1234}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}


# ============================================================
# JPA / Hibernate 配置
# ============================================================
# validate 只校验实体与数据库表结构是否匹配，不自动建表或改表。
# 数据库初始化请手动执行 deploy/mysql/init 下的 SQL 脚本。
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# JSON 时间字段按 ISO 字符串输出，避免输出时间戳数字。
spring.jackson.serialization.write-dates-as-timestamps=false


# ============================================================
# Redis 基础连接配置
# ============================================================
# Redis 当前用于仪表盘缓存；默认本地关闭业务缓存，连接参数保留给 Docker/MySQL 部署。
spring.data.redis.host=${APP_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${APP_REDIS_PORT:6379}
spring.data.redis.password=${APP_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false


# ============================================================
# Actuator 运维监控配置
# ============================================================
# 暴露健康检查和基础信息，供 Nginx、Docker 或运维平台探活。
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=true


# ============================================================
# Swagger / OpenAPI 配置
# ============================================================
# 接口文档地址: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html


# ============================================================
# 业务安全与跨域配置
# ============================================================
# JWT 密钥和过期时间。正式环境建议通过环境变量覆盖密钥，避免使用仓库默认值。
app.jwt.secret=${APP_JWT_SECRET:smart-lane-dispatch-demo-secret}
app.jwt.expire-hours=${APP_JWT_EXPIRE_HOURS:8}

# 前端允许跨域访问的来源。本地默认支持 3000 和 Docker Nginx 3002。
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}


# ============================================================
# 业务缓存开关
# ============================================================
# 是否启用 Redis 仪表盘缓存。默认 false，Docker/MySQL 部署通常会开启。
app.redis.enabled=${APP_REDIS_ENABLED:false}
app.redis.dashboard-ttl-seconds=30


# ============================================================
# 车道入口开放顺序
# ============================================================
# 自动模式下只允许一条未满、在线车道入口绿灯，其余入口红灯。
# 出口自动放行按队首入场时间 FIFO；入口临时插队车道会随实际入场时间排入出口队列。
# 若队首时间相同，再按车道编号中的自然数字顺序兜底，其次按 code/id 排序。
# 入口顺序可配置为 1-11、11-1，或 L01,L02,L03 这类逗号分隔的车道 id/code/name。
# 留空时按车道编号中的自然数字顺序，其次按 code/id 排序。
app.dispatch.entry-lane-order=${APP_DISPATCH_ENTRY_LANE_ORDER:1-11}
# 自动调度启动默认值。数据库 dispatch_configs 中存在 entry_dispatch_enabled / exit_dispatch_enabled 时，以数据库为准。
# 默认 false 表示系统启动后先全红待命，由总览页“车辆开始入场/车辆开始出场”按钮启动自动开绿灯。
app.dispatch.entry-enabled-default=${APP_DISPATCH_ENTRY_ENABLED_DEFAULT:false}
app.dispatch.exit-enabled-default=${APP_DISPATCH_EXIT_ENABLED_DEFAULT:false}
# 总入口预分配保留时长。满 2 分钟仍未被任何车道入口摄像头识别，则生成未进车道告警并释放该车道名额。
app.dispatch.assignment-reserve-minutes=${APP_DISPATCH_ASSIGNMENT_RESERVE_MINUTES:2}


# ============================================================
# 设备网关总开关
# ============================================================
# mock: 不连接现场硬件，用本地模拟设备状态，适合开发/演示。
# mqtt: 启用 MQTT 设备网关，连接车牌识别、计数报警相机和 DIDO 模块。
app.device.gateway=${APP_DEVICE_GATEWAY:mqtt}


# ============================================================
# MQTT Broker 连接配置
# ============================================================
# MQTT Broker 是现场所有物联网设备的消息中转站。
# 后端启用 mqtt 网关后，会连接这里配置的 Broker。
app.device.mqtt.enabled=${APP_DEVICE_MQTT_ENABLED:true}
app.device.mqtt.host=${APP_DEVICE_MQTT_HOST:127.0.0.1}
app.device.mqtt.port=${APP_DEVICE_MQTT_PORT:1883}
app.device.mqtt.client-id=${APP_DEVICE_MQTT_CLIENT_ID:smart-lane-dispatch-system}
app.device.mqtt.username=${APP_DEVICE_MQTT_USERNAME:}
app.device.mqtt.password=${APP_DEVICE_MQTT_PASSWORD:}
app.device.mqtt.keep-alive-seconds=${APP_DEVICE_MQTT_KEEP_ALIVE_SECONDS:30}
app.device.mqtt.reconnect-delay-ms=${APP_DEVICE_MQTT_RECONNECT_DELAY_MS:5000}


# ============================================================
# 车牌识别设备 MQTT 协议配置
# ============================================================
# 对应文档: 车牌识别.pdf
# 上报 Topic 默认格式: /{设备SN}/mf/up
# 下发 Topic 默认格式: /{设备SN}/mf/down
# 总入口主要处理 heartbeat、plateResult，并下发 plateResultResp 确认。
# 总入口 MF 摄像头用于“总入口预分配”，只生成大屏推荐车道，不直接增加车道实际车辆数。
# 现场至少填写 yard-entry-sn；如果同一 SN 下有多路相机，再同时填写 groupId/deviceNo 做精确匹配。
app.device.parking-mf.enabled=${APP_DEVICE_PARKING_MF_ENABLED:true}
app.device.parking-mf.up-topic-filter=${APP_DEVICE_PARKING_MF_UP_TOPIC_FILTER:/+/mf/up}
app.device.parking-mf.down-topic-template=${APP_DEVICE_PARKING_MF_DOWN_TOPIC_TEMPLATE:/{mfSn}/mf/down}
app.device.parking-mf.yard-entry-sn=${APP_DEVICE_PARKING_MF_YARD_ENTRY_SN:}
app.device.parking-mf.yard-entry-group-id=${APP_DEVICE_PARKING_MF_YARD_ENTRY_GROUP_ID:}
app.device.parking-mf.yard-entry-device-no=${APP_DEVICE_PARKING_MF_YARD_ENTRY_DEVICE_NO:}


# ============================================================
# 计数报警相机 MQTT 协议配置
# ============================================================
# 对应文档: 计数报警.docx
# 上报 Topic 默认格式: /device/{cameraDevId}/update
# 下发 Topic 默认格式: /device/{cameraDevId}/get
# 遗嘱 Topic 默认格式: /device/{cameraDevId}/will
# 主要处理 heartbeat、devAlarm。入口相机上报的 passCount/getHaveCarRsp 不参与出场统计。
app.device.smart-camera.enabled=${APP_DEVICE_SMART_CAMERA_ENABLED:true}
app.device.smart-camera.up-topic-filter=${APP_DEVICE_SMART_CAMERA_UP_TOPIC_FILTER:/device/+/update}
app.device.smart-camera.will-topic-filter=${APP_DEVICE_SMART_CAMERA_WILL_TOPIC_FILTER:/device/+/will}
app.device.smart-camera.down-topic-template=${APP_DEVICE_SMART_CAMERA_DOWN_TOPIC_TEMPLATE:/device/{cameraDevId}/get}
# 总入口摄像头 devId。配置后，该摄像头通过同一 MQTT Broker 上报 devAlarm 识别车牌时，
# 后端会登记总入口入场记录，并自动生成大屏进场信息和引导牌数据。
app.device.smart-camera.yard-entry-camera-dev-id=${APP_DEVICE_SMART_CAMERA_YARD_ENTRY_CAMERA_DEV_ID:}
# 自动流程当前入口车道摄像头 devId。配置后，该摄像头的入口报警不再固定绑定单条车道，
# 而是直接写入自动流程当前入口车道，适合联调测试共享入口相机场景。
app.device.smart-camera.active-entry-camera-dev-id=${APP_DEVICE_SMART_CAMERA_ACTIVE_ENTRY_CAMERA_DEV_ID:}
app.device.smart-camera.request-version-on-connect=${APP_DEVICE_SMART_CAMERA_REQUEST_VERSION_ON_CONNECT:true}
app.device.smart-camera.have-car-poll-enabled=${APP_DEVICE_SMART_CAMERA_HAVE_CAR_POLL_ENABLED:false}
app.device.smart-camera.have-car-poll-ms=${APP_DEVICE_SMART_CAMERA_HAVE_CAR_POLL_MS:30000}


# ============================================================
# DIDO 模块 MQTT 协议配置
# ============================================================
# 对应文档: dido模块.pdf
# DIDO 用于控制继电器输出，例如入口红灯、入口绿灯、出口红灯、出口绿灯。
# relay-mode=ordinary 表示持续吸合/断开，适合红绿灯常亮控制。
# pulse_ms / pulse_seconds / pulse_minutes 表示脉冲控制，仅在现场设备要求脉冲时使用。
app.device.dido.enabled=${APP_DEVICE_DIDO_ENABLED:true}
app.device.dido.up-topic-filter=${APP_DEVICE_DIDO_UP_TOPIC_FILTER:/device/+/update}
app.device.dido.down-topic-template=${APP_DEVICE_DIDO_DOWN_TOPIC_TEMPLATE:/device/{didoDeviceId}/get}
app.device.dido.payload-mode=${APP_DEVICE_DIDO_PAYLOAD_MODE:json}
app.device.dido.relay-mode=${APP_DEVICE_DIDO_RELAY_MODE:ordinary}
app.device.dido.pulse-milliseconds=${APP_DEVICE_DIDO_PULSE_MILLISECONDS:500}
app.device.dido.enable-remote-config-on-connect=${APP_DEVICE_DIDO_ENABLE_REMOTE_CONFIG_ON_CONNECT:false}
app.device.dido.enable-relay-upload-on-connect=${APP_DEVICE_DIDO_ENABLE_RELAY_UPLOAD_ON_CONNECT:false}
# 出口地感自动出场开关。现场默认开启；排查输入极性或误触发时可临时设为 false。
app.device.dido.exit-trigger-enabled=${APP_DEVICE_DIDO_EXIT_TRIGGER_ENABLED:true}

# ============================================================
# TCP DIDO 直连协议配置
# ============================================================
# CX-5216E 默认可通过 192.168.0.18:50000 接收 HEX/TCP 指令。
# gateway=tcp-dido 时，后端不走 MQTT，直接向设备 TCP 端口发送继电器开关命令。
# protocol=A1 使用现场实测基础指令: CC DD A1 01 SH SL EH EL A4 48。
# protocol=A3 使用文档兼容场景指令: CC DD A3 01 S6..S1 E6..E1 TH TL DD CC。
app.device.dido-tcp.host=${APP_DEVICE_DIDO_TCP_HOST:192.168.1.18}
app.device.dido-tcp.port=${APP_DEVICE_DIDO_TCP_PORT:8080}
app.device.dido-tcp.timeout-ms=${APP_DEVICE_DIDO_TCP_TIMEOUT_MS:3000}
app.device.dido-tcp.protocol=${APP_DEVICE_DIDO_TCP_PROTOCOL:A1}


# ============================================================
# LED 引导大屏自动下发配置
# ============================================================
# 总入口摄像头生成推荐车道后，后端按 1 列 4 行发送到现场 LED 大屏：
# 前三行显示最新抓拍高亮或最近 3 条历史引导，第四行固定显示提示语。
# columns/rows/font-size 保留旧配置兼容，业务自动下发不再使用这些布局参数。
app.led.guide.enabled=${APP_LED_GUIDE_ENABLED:false}
app.led.guide.ip=${APP_LED_GUIDE_IP:172.17.2.70}
app.led.guide.port=${APP_LED_GUIDE_PORT:5005}
app.led.guide.generation=${APP_LED_GUIDE_GENERATION:6}
app.led.guide.model=${APP_LED_GUIDE_MODEL:Bx6E}
app.led.guide.screen-width=${APP_LED_GUIDE_SCREEN_WIDTH:192}
app.led.guide.screen-height=${APP_LED_GUIDE_SCREEN_HEIGHT:96}
app.led.guide.columns=${APP_LED_GUIDE_COLUMNS:2}
app.led.guide.rows=${APP_LED_GUIDE_ROWS:6}
app.led.guide.font-size=${APP_LED_GUIDE_FONT_SIZE:72}
app.led.guide.color=${APP_LED_GUIDE_COLOR:RED}
app.led.guide.prompt-text=${APP_LED_GUIDE_PROMPT_TEXT:请按照车道指示进行停车等待！}
app.led.guide.highlight-duration-ms=${APP_LED_GUIDE_HIGHLIGHT_DURATION_MS:10000}
app.led.guide.write-mode=${APP_LED_GUIDE_WRITE_MODE:DYNAMIC_WITH_PROGRAM_FALLBACK}
app.led.guide.dynamic-area-start-id=${APP_LED_GUIDE_DYNAMIC_AREA_START_ID:0}
app.led.guide.full-refresh-ms=${APP_LED_GUIDE_FULL_REFRESH_MS:60000}
app.led.guide.initial-delay-ms=${APP_LED_GUIDE_INITIAL_DELAY_MS:5000}
app.led.guide.refresh-ms=${APP_LED_GUIDE_REFRESH_MS:5000}


# ============================================================
# 车道与现场设备绑定配置示例
# ============================================================
# 这部分需要现场提供真实设备表后再填写。
# 11 条车道需要从 app.device.lanes[0] 配到 app.device.lanes[10]。
#
# 字段说明:
# lane-id: 系统数据库 lanes.id，例如 L01。
# camera-dev-id: Smart Camera 设备 devId/camId，对应 /device/{cameraDevId}/update。
# entry-dido-device-id: 入口 CX/DIDO 模块设备 ID，对应 /device/{didoDeviceId}/get。
# exit-dido-device-id: 出口 CX/DIDO 模块设备 ID，对应 /device/{didoDeviceId}/get。
# entry-dido-host / entry-dido-port: 可选，tcp-dido 模式下覆盖入口 DIDO TCP 地址。
# exit-dido-host / exit-dido-port: 可选，tcp-dido 模式下覆盖出口 DIDO TCP 地址。
# entry-red-relay / entry-green-relay: 入口红灯/绿灯继电器口，例如 A01/A02。
# exit-red-relay / exit-green-relay: 出口红灯/绿灯继电器口，例如 A03/A04。
# presence-input-key: 可选，DIDO 输入口，例如 B01，用于判断车道是否有车。
# exit-trigger-input-key: 可选，DIDO 输入口，例如 B01；从未触发->触发时视为该车道有 1 辆车出场。
#
# 示例
# app.device.lanes[0].lane-id=L01
# app.device.lanes[0].camera-dev-id=SMART-CAM-01
# app.device.lanes[0].entry-dido-device-id=DIDO-ENTRY-01
# app.device.lanes[0].entry-dido-host=192.168.0.18
# app.device.lanes[0].entry-dido-port=50000
# app.device.lanes[0].exit-dido-device-id=DIDO-EXIT-01
# app.device.lanes[0].exit-dido-host=192.168.0.19
# app.device.lanes[0].exit-dido-port=50000
# app.device.lanes[0].entry-red-relay=A01
# app.device.lanes[0].entry-green-relay=A02
# app.device.lanes[0].exit-red-relay=A03
# app.device.lanes[0].exit-green-relay=A04
# app.device.lanes[0].presence-input-key=B01
# app.device.lanes[0].exit-trigger-input-key=B01

# ============================================================
# 现场设备绑定模板
# ============================================================
# 现场只需要在 .env 中替换 APP_DEVICE_* 变量，应用配置会自动生效。
# 1-11 车道入口摄像头使用 Smart Camera，填写 Lxx_CAMERA_DEV_ID。
# 当前默认按 2 台 CX/DIDO 设备控制 11 条车道:
# - 入口 CX/DIDO: DO1-DO11 对应 1-11 号车道入口灯，映射为 A01-A11
# - 出口 CX/DIDO: DO1-DO11 对应 1-11 号车道出口灯，映射为 A01-A11
# - 出口 CX/DIDO: IN1-IN11 对应 1-11 号车道出口地感，映射为 B01-B11
# 单灯模式下:
# - 对应车道 entry-green-relay / exit-green-relay 吸合 = 红灯
# - 对应车道 entry-green-relay / exit-green-relay 断开 = 绿灯
# 因此默认不再配置 entry-red-relay / exit-red-relay。
app.device.shared-entry-dido-device-id=${APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID:DIDO-ENTRY-01}
app.device.shared-entry-dido-host=${APP_DEVICE_SHARED_ENTRY_DIDO_HOST:192.168.1.18}
app.device.shared-entry-dido-port=${APP_DEVICE_SHARED_ENTRY_DIDO_PORT:8080}
app.device.shared-exit-dido-device-id=${APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID:DIDO-EXIT-01}
app.device.shared-exit-dido-host=${APP_DEVICE_SHARED_EXIT_DIDO_HOST:192.168.1.19}
app.device.shared-exit-dido-port=${APP_DEVICE_SHARED_EXIT_DIDO_PORT:8080}

# L01 - 1号车道
app.device.lanes[0].lane-id=L01
app.device.lanes[0].camera-dev-id=${APP_DEVICE_L01_CAMERA_DEV_ID:}
app.device.lanes[0].entry-dido-device-id=${APP_DEVICE_L01_ENTRY_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID:DIDO-ENTRY-01}}
app.device.lanes[0].entry-dido-host=${APP_DEVICE_L01_ENTRY_DIDO_HOST:${APP_DEVICE_SHARED_ENTRY_DIDO_HOST:192.168.1.18}}
app.device.lanes[0].entry-dido-port=${APP_DEVICE_L01_ENTRY_DIDO_PORT:${APP_DEVICE_SHARED_ENTRY_DIDO_PORT:8080}}
app.device.lanes[0].exit-dido-device-id=${APP_DEVICE_L01_EXIT_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID:DIDO-EXIT-01}}
app.device.lanes[0].exit-dido-host=${APP_DEVICE_L01_EXIT_DIDO_HOST:${APP_DEVICE_SHARED_EXIT_DIDO_HOST:192.168.1.19}}
app.device.lanes[0].exit-dido-port=${APP_DEVICE_L01_EXIT_DIDO_PORT:${APP_DEVICE_SHARED_EXIT_DIDO_PORT:8080}}
app.device.lanes[0].entry-red-relay=${APP_DEVICE_L01_ENTRY_RED_RELAY:}
app.device.lanes[0].entry-green-relay=${APP_DEVICE_L01_ENTRY_GREEN_RELAY:A01}
app.device.lanes[0].exit-red-relay=${APP_DEVICE_L01_EXIT_RED_RELAY:}
app.device.lanes[0].exit-green-relay=${APP_DEVICE_L01_EXIT_GREEN_RELAY:A01}
app.device.lanes[0].presence-input-key=${APP_DEVICE_L01_PRESENCE_INPUT_KEY:}
app.device.lanes[0].exit-trigger-input-key=${APP_DEVICE_L01_EXIT_TRIGGER_INPUT_KEY:B01}

# L02 - 2号车道
app.device.lanes[1].lane-id=L02
app.device.lanes[1].camera-dev-id=${APP_DEVICE_L02_CAMERA_DEV_ID:}
app.device.lanes[1].entry-dido-device-id=${APP_DEVICE_L02_ENTRY_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID:DIDO-ENTRY-01}}
app.device.lanes[1].entry-dido-host=${APP_DEVICE_L02_ENTRY_DIDO_HOST:${APP_DEVICE_SHARED_ENTRY_DIDO_HOST:192.168.1.18}}
app.device.lanes[1].entry-dido-port=${APP_DEVICE_L02_ENTRY_DIDO_PORT:${APP_DEVICE_SHARED_ENTRY_DIDO_PORT:8080}}
app.device.lanes[1].exit-dido-device-id=${APP_DEVICE_L02_EXIT_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID:DIDO-EXIT-01}}
app.device.lanes[1].exit-dido-host=${APP_DEVICE_L02_EXIT_DIDO_HOST:${APP_DEVICE_SHARED_EXIT_DIDO_HOST:192.168.1.19}}
app.device.lanes[1].exit-dido-port=${APP_DEVICE_L02_EXIT_DIDO_PORT:${APP_DEVICE_SHARED_EXIT_DIDO_PORT:8080}}
app.device.lanes[1].entry-red-relay=${APP_DEVICE_L02_ENTRY_RED_RELAY:}
app.device.lanes[1].entry-green-relay=${APP_DEVICE_L02_ENTRY_GREEN_RELAY:A02}
app.device.lanes[1].exit-red-relay=${APP_DEVICE_L02_EXIT_RED_RELAY:}
app.device.lanes[1].exit-green-relay=${APP_DEVICE_L02_EXIT_GREEN_RELAY:A02}
app.device.lanes[1].presence-input-key=${APP_DEVICE_L02_PRESENCE_INPUT_KEY:}
app.device.lanes[1].exit-trigger-input-key=${APP_DEVICE_L02_EXIT_TRIGGER_INPUT_KEY:B02}

# L03 - 3号车道
app.device.lanes[2].lane-id=L03
app.device.lanes[2].camera-dev-id=${APP_DEVICE_L03_CAMERA_DEV_ID:}
app.device.lanes[2].entry-dido-device-id=${APP_DEVICE_L03_ENTRY_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID:DIDO-ENTRY-01}}
app.device.lanes[2].entry-dido-host=${APP_DEVICE_L03_ENTRY_DIDO_HOST:${APP_DEVICE_SHARED_ENTRY_DIDO_HOST:192.168.1.18}}
app.device.lanes[2].entry-dido-port=${APP_DEVICE_L03_ENTRY_DIDO_PORT:${APP_DEVICE_SHARED_ENTRY_DIDO_PORT:8080}}
app.device.lanes[2].exit-dido-device-id=${APP_DEVICE_L03_EXIT_DIDO_DEVICE_ID:${APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID:DIDO-EXIT-01}}
