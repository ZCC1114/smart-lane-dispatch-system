# ============================================================
# 基础服务配置
# ============================================================
# 应用名称，仅用于日志、Actuator info 等标识。
spring.application.name=smart-lane-dispatch-system

# 后端 HTTP 服务端口。本地前端默认访问 http://localhost:8080。
server.port=8080


# ============================================================
# 数据库配置
# ============================================================
# 本地和现场默认使用 MySQL，避免 H2 内存库重启后丢账号、丢业务数据。
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/smart_lane_dispatch?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${APP_DATASOURCE_USERNAME:root}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:root1234}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}


# ============================================================
# JPA / Hibernate 配置
# ============================================================
# validate 只校验实体与数据库表结构是否匹配，不自动建表或改表。
# 数据库初始化请手动执行 deploy/mysql/init 下的 SQL 脚本。
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# JSON 时间字段按 ISO 字符串输出，避免输出时间戳数字。
spring.jackson.serialization.write-dates-as-timestamps=false


# ============================================================
# Redis 基础连接配置
# ============================================================
# Redis 当前用于仪表盘缓存；默认本地关闭业务缓存，连接参数保留给 Docker/MySQL 部署。
spring.data.redis.host=${APP_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${APP_REDIS_PORT:6379}
spring.data.redis.password=${APP_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false


# ============================================================
# Actuator 运维监控配置
# ============================================================
# 暴露健康检查和基础信息，供 Nginx、Docker 或运维平台探活。
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=true


# ============================================================
# Swagger / OpenAPI 配置
# ============================================================
# 接口文档地址: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html


# ============================================================
# 业务安全与跨域配置
# ============================================================
# JWT 密钥和过期时间。正式环境建议通过环境变量覆盖密钥，避免使用仓库默认值。
app.jwt.secret=smart-lane-dispatch-demo-secret
app.jwt.expire-hours=8

# 前端允许跨域访问的来源。本地默认支持 3000 和 Docker Nginx 3002。
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}


# ============================================================
# 业务缓存开关
# ============================================================
# 是否启用 Redis 仪表盘缓存。默认 false，Docker/MySQL 部署通常会开启。
app.redis.enabled=${APP_REDIS_ENABLED:false}
app.redis.dashboard-ttl-seconds=30


# ============================================================
# 车道入口开放顺序
# ============================================================
# 自动模式下只允许一条未满、在线车道入口绿灯，其余入口红灯。
# 出口自动放行按队首入场时间 FIFO；入口临时插队车道会随实际入场时间排入出口队列。
# 若队首时间相同，再按车道编号中的自然数字顺序兜底，其次按 code/id 排序。
# 入口顺序可配置为 1-11、11-1，或 L01,L02,L03 这类逗号分隔的车道 id/code/name。
# 留空时按车道编号中的自然数字顺序，其次按 code/id 排序。
app.dispatch.entry-lane-order=${APP_DISPATCH_ENTRY_LANE_ORDER:1-11}
# 自动调度启动默认值。数据库 dispatch_configs 中存在 entry_dispatch_enabled / exit_dispatch_enabled 时，以数据库为准。
# 默认 false 表示系统启动后先全红待命，由总览页“车辆开始入场/车辆开始出场”按钮启动自动开绿灯。
app.dispatch.entry-enabled-default=${APP_DISPATCH_ENTRY_ENABLED_DEFAULT:false}
app.dispatch.exit-enabled-default=${APP_DISPATCH_EXIT_ENABLED_DEFAULT:false}
# 总入口预分配保留时长。满 2 分钟仍未被任何车道入口摄像头识别，则生成未进车道告警并释放该车道名额。
app.dispatch.assignment-reserve-minutes=${APP_DISPATCH_ASSIGNMENT_RESERVE_MINUTES:2}


# ============================================================
# 设备网关总开关
# ============================================================
# mock: 不连接现场硬件，用本地模拟设备状态，适合开发/演示。
# mqtt: 启用 MQTT 设备网关，连接车牌识别、计数报警相机和 DIDO 模块。
app.device.gateway=${APP_DEVICE_GATEWAY:mqtt}


# ============================================================
# MQTT Broker 连接配置
# ============================================================
# MQTT Broker 是现场所有物联网设备的消息中转站。
# 后端启用 mqtt 网关后，会连接这里配置的 Broker。
app.device.mqtt.enabled=${APP_DEVICE_MQTT_ENABLED:true}
app.device.mqtt.host=${APP_DEVICE_MQTT_HOST:127.0.0.1}
app.device.mqtt.port=${APP_DEVICE_MQTT_PORT:1883}
app.device.mqtt.client-id=${APP_DEVICE_MQTT_CLIENT_ID:smart-lane-dispatch-system}
app.device.mqtt.username=${APP_DEVICE_MQTT_USERNAME:}
app.device.mqtt.password=${APP_DEVICE_MQTT_PASSWORD:}
app.device.mqtt.keep-alive-seconds=${APP_DEVICE_MQTT_KEEP_ALIVE_SECONDS:30}
app.device.mqtt.reconnect-delay-ms=${APP_DEVICE_MQTT_RECONNECT_DELAY_MS:5000}


# ============================================================
# 车牌识别设备 MQTT 协议配置
# ============================================================
# 对应文档: 车牌识别.pdf
# 上报 Topic 默认格式: /{设备SN}/mf/up
# 下发 Topic 默认格式: /{设备SN}/mf/down
# 主要处理 heartbeat、plateResult；主要下发 ledControl、ioOutput。
app.device.parking-mf.enabled=${APP_DEVICE_PARKING_MF_ENABLED:true}
app.device.parking-mf.up-topic-filter=${APP_DEVICE_PARKING_MF_UP_TOPIC_FILTER:/+/mf/up}
app.device.parking-mf.down-topic-template=${APP_DEVICE_PARKING_MF_DOWN_TOPIC_TEMPLATE:/{mfSn}/mf/down}


# ============================================================
# 计数报警相机 MQTT 协议配置
# ============================================================
# 对应文档: 计数报警.docx
# 上报 Topic 默认格式: /device/{cameraDevId}/update
# 下发 Topic 默认格式: /device/{cameraDevId}/get
# 遗嘱 Topic 默认格式: /device/{cameraDevId}/will
# 主要处理 heartbeat、devAlarm。入口相机上报的 passCount/getHaveCarRsp 不参与出场统计。
app.device.smart-camera.enabled=${APP_DEVICE_SMART_CAMERA_ENABLED:true}
app.device.smart-camera.up-topic-filter=${APP_DEVICE_SMART_CAMERA_UP_TOPIC_FILTER:/device/+/update}
app.device.smart-camera.will-topic-filter=${APP_DEVICE_SMART_CAMERA_WILL_TOPIC_FILTER:/device/+/will}
app.device.smart-camera.down-topic-template=${APP_DEVICE_SMART_CAMERA_DOWN_TOPIC_TEMPLATE:/device/{cameraDevId}/get}
# 总入口摄像头 devId。配置后，该摄像头通过同一 MQTT Broker 上报 devAlarm 识别车牌时，
# 后端会登记总入口入场记录，并自动生成大屏进场信息和引导牌数据。
app.device.smart-camera.yard-entry-camera-dev-id=${APP_DEVICE_SMART_CAMERA_YARD_ENTRY_CAMERA_DEV_ID:}
app.device.smart-camera.request-version-on-connect=${APP_DEVICE_SMART_CAMERA_REQUEST_VERSION_ON_CONNECT:true}
app.device.smart-camera.have-car-poll-enabled=${APP_DEVICE_SMART_CAMERA_HAVE_CAR_POLL_ENABLED:false}
app.device.smart-camera.have-car-poll-ms=${APP_DEVICE_SMART_CAMERA_HAVE_CAR_POLL_MS:30000}


# ============================================================
# DIDO 模块 MQTT 协议配置
# ============================================================
# 对应文档: dido模块.pdf
# DIDO 用于控制继电器输出，例如入口红灯、入口绿灯、出口红灯、出口绿灯。
# relay-mode=ordinary 表示持续吸合/断开，适合红绿灯常亮控制。
# pulse_ms / pulse_seconds / pulse_minutes 表示脉冲控制，仅在现场设备要求脉冲时使用。
app.device.dido.enabled=${APP_DEVICE_DIDO_ENABLED:true}
app.device.dido.up-topic-filter=${APP_DEVICE_DIDO_UP_TOPIC_FILTER:/device/+/update}
app.device.dido.down-topic-template=${APP_DEVICE_DIDO_DOWN_TOPIC_TEMPLATE:/device/{didoDeviceId}/get}
app.device.dido.relay-mode=${APP_DEVICE_DIDO_RELAY_MODE:ordinary}
app.device.dido.pulse-milliseconds=${APP_DEVICE_DIDO_PULSE_MILLISECONDS:500}

# ============================================================
# TCP DIDO 直连协议配置
# ============================================================
# CX-5216E 默认可通过 192.168.0.18:50000 接收 HEX/TCP 指令。
# gateway=tcp-dido 时，后端不走 MQTT，直接向设备 TCP 端口发送继电器开关命令。
# protocol=A1 使用现场实测基础指令: CC DD A1 01 SH SL EH EL A4 48。
# protocol=A3 使用文档兼容场景指令: CC DD A3 01 S6..S1 E6..E1 TH TL DD CC。
app.device.dido-tcp.host=${APP_DEVICE_DIDO_TCP_HOST:192.168.0.18}
app.device.dido-tcp.port=${APP_DEVICE_DIDO_TCP_PORT:50000}
app.device.dido-tcp.timeout-ms=${APP_DEVICE_DIDO_TCP_TIMEOUT_MS:3000}
app.device.dido-tcp.protocol=${APP_DEVICE_DIDO_TCP_PROTOCOL:A1}


# ============================================================
# 车道与现场设备绑定配置示例
# ============================================================
# 这部分需要现场提供真实设备表后再填写。
# 11 条车道需要从 app.device.lanes[0] 配到 app.device.lanes[10]。
#
# 字段说明:
# lane-id: 系统数据库 lanes.id，例如 L01。
# mf-sn: 车牌识别设备 SN，对应 /{sn}/mf/up。
# mf-group-id: 车牌识别设备 groupId，用于开闸、LED 下发。
# mf-device-no: 车牌识别设备 deviceNo，用于上报时匹配车道。
# camera-dev-id: 计数报警相机 devId/camId，对应 /device/{cameraDevId}/update。
# dido-device-id: DIDO 模块设备 ID，对应 /device/{didoDeviceId}/get。
# dido-host / dido-port: 可选，tcp-dido 模式下覆盖全局 DIDO TCP 地址。
# entry-red-relay / entry-green-relay: 入口红灯/绿灯继电器口，例如 A01/A02。
# exit-red-relay / exit-green-relay: 出口红灯/绿灯继电器口，例如 A03/A04。
# presence-input-key: 可选，DIDO 输入口，例如 B01，用于判断车道是否有车。
#
# 示例
# app.device.lanes[0].lane-id=L01
# app.device.lanes[0].mf-sn=MF-SN-001
# app.device.lanes[0].mf-group-id=1
# app.device.lanes[0].mf-device-no=CAM-ENTRY-01
# app.device.lanes[0].camera-dev-id=SMART-CAM-01
# app.device.lanes[0].dido-device-id=DIDO-01
# app.device.lanes[0].dido-host=192.168.0.18
# app.device.lanes[0].dido-port=50000
# app.device.lanes[0].entry-red-relay=A01
# app.device.lanes[0].entry-green-relay=A02
# app.device.lanes[0].exit-red-relay=A03
# app.device.lanes[0].exit-green-relay=A04
# app.device.lanes[0].presence-input-key=B01

# ============================================================
# 当前现场联调设备绑定
# ============================================================
# 这台智能追缴分析相机上报 topic:
# /device/18030023526b/update
# 所以后端用 camera-dev-id=18030023526b 把它绑定到系统 1 号车道 L01。
app.device.lanes[0].lane-id=L01
app.device.lanes[0].camera-dev-id=18030023526b


# ============================================================
# Bootstrap Admin 引导管理员配置
# ============================================================
# 数据库为空或需要恢复后台访问时才开启。
# 日常运行建议保持 false，账号密码通过环境变量注入，不要写死在仓库。
app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap-admin.display-name=${APP_BOOTSTRAP_ADMIN_DISPLAY_NAME:\u7cfb\u7edf\u8d85\u7ea7\u7ba1\u7406\u5458}
app.bootstrap-admin.station=${APP_BOOTSTRAP_ADMIN_STATION:\u603b\u63a7\u4e2d\u5fc3}


# ============================================================
# Actuator info 应用信息
# ============================================================
info.app.name=smart-lane-dispatch-system
info.app.description=Smart lane dispatch system backend
info.app.mode=${SPRING_PROFILES_ACTIVE:default}
