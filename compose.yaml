services:
  mysql:
    image: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}/mysql:8.4
    container_name: smart-lane-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_lane_dispatch}
      MYSQL_USER: ${MYSQL_USER:-smartlane}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartlane}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}/redis:7.4-alpine
    container_name: smart-lane-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  mqtt:
    image: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}/eclipse-mosquitto:2
    container_name: smart-lane-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/mosquitto/password_file:/mosquitto/config/password_file:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log

  server:
    build:
      context: ./server
      args:
        DOCKER_IMAGE_REGISTRY: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}
    container_name: smart-lane-server
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mqtt:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      APP_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-smart_lane_dispatch}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      APP_DATASOURCE_USERNAME: ${MYSQL_USER:-smartlane}
      APP_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-smartlane}
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_REDIS_ENABLED: "true"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3002,http://127.0.0.1:3002,http://localhost:3000,http://127.0.0.1:3000}
      APP_JPA_DDL_AUTO: validate
      APP_DEVICE_GATEWAY: ${APP_DEVICE_GATEWAY:-mqtt}
      APP_DEVICE_MQTT_ENABLED: ${APP_DEVICE_MQTT_ENABLED:-true}
      APP_DEVICE_MQTT_HOST: ${APP_DEVICE_MQTT_HOST:-mqtt}
      APP_DEVICE_MQTT_PORT: ${APP_DEVICE_MQTT_PORT:-1883}
      APP_DEVICE_MQTT_CLIENT_ID: ${APP_DEVICE_MQTT_CLIENT_ID:-smart-lane-dispatch-system}
      APP_DEVICE_MQTT_USERNAME: ${APP_DEVICE_MQTT_USERNAME:-jcadmin}
      APP_DEVICE_MQTT_PASSWORD: ${APP_DEVICE_MQTT_PASSWORD:-jcadmin@12345}
      APP_DEVICE_DIDO_PAYLOAD_MODE: ${APP_DEVICE_DIDO_PAYLOAD_MODE:-json}
      APP_DEVICE_DIDO_ENABLE_REMOTE_CONFIG_ON_CONNECT: ${APP_DEVICE_DIDO_ENABLE_REMOTE_CONFIG_ON_CONNECT:-false}
      APP_DEVICE_DIDO_ENABLE_RELAY_UPLOAD_ON_CONNECT: ${APP_DEVICE_DIDO_ENABLE_RELAY_UPLOAD_ON_CONNECT:-false}
      APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID: ${APP_DEVICE_SHARED_ENTRY_DIDO_DEVICE_ID:-DIDO-ENTRY-01}
      APP_DEVICE_SHARED_ENTRY_DIDO_HOST: ${APP_DEVICE_SHARED_ENTRY_DIDO_HOST:-192.168.1.18}
      APP_DEVICE_SHARED_ENTRY_DIDO_PORT: ${APP_DEVICE_SHARED_ENTRY_DIDO_PORT:-8080}
      APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID: ${APP_DEVICE_SHARED_EXIT_DIDO_DEVICE_ID:-DIDO-EXIT-01}
      APP_DEVICE_SHARED_EXIT_DIDO_HOST: ${APP_DEVICE_SHARED_EXIT_DIDO_HOST:-192.168.1.19}
      APP_DEVICE_SHARED_EXIT_DIDO_PORT: ${APP_DEVICE_SHARED_EXIT_DIDO_PORT:-8080}
      APP_LED_GUIDE_ENABLED: ${APP_LED_GUIDE_ENABLED:-true}
      APP_LED_GUIDE_IP: ${APP_LED_GUIDE_IP:-172.17.2.70}
      APP_LED_GUIDE_PORT: ${APP_LED_GUIDE_PORT:-5005}
      APP_LED_GUIDE_GENERATION: ${APP_LED_GUIDE_GENERATION:-6}
      APP_LED_GUIDE_MODEL: ${APP_LED_GUIDE_MODEL:-Bx6E}
      APP_LED_GUIDE_SCREEN_WIDTH: ${APP_LED_GUIDE_SCREEN_WIDTH:-192}
      APP_LED_GUIDE_SCREEN_HEIGHT: ${APP_LED_GUIDE_SCREEN_HEIGHT:-96}
      APP_LED_GUIDE_COLUMNS: ${APP_LED_GUIDE_COLUMNS:-2}
      APP_LED_GUIDE_ROWS: ${APP_LED_GUIDE_ROWS:-6}
      APP_LED_GUIDE_FONT_SIZE: ${APP_LED_GUIDE_FONT_SIZE:-15}
      APP_LED_GUIDE_COLOR: ${APP_LED_GUIDE_COLOR:-RED}
      APP_LED_GUIDE_PROMPT_TEXT: ${APP_LED_GUIDE_PROMPT_TEXT:-请按照车道指示进行停车等待！}
      APP_LED_GUIDE_HIGHLIGHT_DURATION_MS: ${APP_LED_GUIDE_HIGHLIGHT_DURATION_MS:-10000}
      APP_LED_GUIDE_WRITE_MODE: ${APP_LED_GUIDE_WRITE_MODE:-DYNAMIC_WITH_PROGRAM_FALLBACK}
      APP_LED_GUIDE_DYNAMIC_AREA_START_ID: ${APP_LED_GUIDE_DYNAMIC_AREA_START_ID:-0}
      APP_LED_GUIDE_FULL_REFRESH_MS: ${APP_LED_GUIDE_FULL_REFRESH_MS:-60000}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      args:
        DOCKER_IMAGE_REGISTRY: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_WS_ENDPOINT: /ws
        NEXT_PUBLIC_DEVICE_MQTT_HOST: ${APP_PUBLIC_HOST:-127.0.0.1}
        NEXT_PUBLIC_MQTT_WS_HOST: ${APP_PUBLIC_HOST:-127.0.0.1}
        NEXT_PUBLIC_MQTT_USERNAME: ${APP_DEVICE_MQTT_USERNAME:-jcadmin}
        NEXT_PUBLIC_MQTT_PASSWORD: ${APP_DEVICE_MQTT_PASSWORD:-jcadmin@12345}
    container_name: smart-lane-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: ${DOCKER_IMAGE_REGISTRY:-docker.m.daocloud.io/library}/nginx:1.27-alpine
    container_name: smart-lane-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-3002}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  redis-data:
  mqtt-data:
  mqtt-log:

networks:
  default:
    name: smart-lane-dispatch-net
    ipam:
      config:
        - subnet: ${COMPOSE_NETWORK_SUBNET:-10.88.0.0/16}
          gateway: ${COMPOSE_NETWORK_GATEWAY:-10.88.0.1}
